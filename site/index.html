<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unformed Ideas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafaf9;
      color: #292524;
    }
    main {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 300;
      margin-bottom: 0.5rem;
    }
    p {
      color: #78716c;
      font-size: 1.1rem;
    }
    a {
      color: #2563eb;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .projects {
      margin-top: 2rem;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Unformed Ideas</h1>
    <p>Under construction.</p>
    <svg viewBox="0 0 400 320" width="320" height="256" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:1.5rem auto 0;overflow:visible;">
      <defs>
        <!-- Animation: wheels spin -->
        <animateTransform id="wheelSpin" attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="0.8s" repeatCount="indefinite"/>

        <!-- Animation: bounce -->
        <animateTransform id="bounce" attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="0.6s" repeatCount="indefinite"/>

        <!-- Animation: speed lines slide -->
        <animateTransform id="speedLines" attributeName="transform" type="translate" from="0 0" to="-40 0" dur="0.5s" repeatCount="indefinite"/>
      </defs>

      <!-- Ground line -->
      <line x1="20" y1="270" x2="380" y2="270" stroke="#d6d3d1" stroke-width="2" stroke-linecap="round"/>

      <!-- Speed lines (animated) -->
      <g opacity="0.6">
        <line x1="30" y1="210" x2="70" y2="210" stroke="#d6d3d1" stroke-width="2.5" stroke-linecap="round">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="-50 0" dur="0.4s" repeatCount="indefinite"/>
        </line>
        <line x1="15" y1="228" x2="60" y2="228" stroke="#d6d3d1" stroke-width="2" stroke-linecap="round">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="-50 0" dur="0.5s" repeatCount="indefinite"/>
        </line>
        <line x1="25" y1="245" x2="55" y2="245" stroke="#d6d3d1" stroke-width="2" stroke-linecap="round">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="-50 0" dur="0.35s" repeatCount="indefinite"/>
        </line>
        <line x1="45" y1="190" x2="80" y2="190" stroke="#d6d3d1" stroke-width="1.5" stroke-linecap="round">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="-50 0" dur="0.45s" repeatCount="indefinite"/>
        </line>
      </g>

      <!-- Back wheel (with animated spokes) -->
      <g transform="translate(135, 262)">
        <circle r="18" fill="#44403c" stroke="#292524" stroke-width="3"/>
        <circle r="6" fill="#78716c"/>
        <!-- Spokes that rotate -->
        <g>
          <line y1="-18" y2="18" stroke="#57534e" stroke-width="1.5"/>
          <line x1="-18" x2="18" stroke="#57534e" stroke-width="1.5"/>
          <line x1="-13" y1="-13" x2="13" y2="13" stroke="#57534e" stroke-width="1.5"/>
          <line x1="13" y1="-13" x2="-13" y2="13" stroke="#57534e" stroke-width="1.5"/>
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="0.6s" repeatCount="indefinite"/>
        </g>
      </g>

      <!-- Front wheel (with animated spokes) -->
      <g transform="translate(280, 262)">
        <circle r="18" fill="#44403c" stroke="#292524" stroke-width="3"/>
        <circle r="6" fill="#78716c"/>
        <!-- Spokes that rotate -->
        <g>
          <line y1="-18" y2="18" stroke="#57534e" stroke-width="1.5"/>
          <line x1="-18" x2="18" stroke="#57534e" stroke-width="1.5"/>
          <line x1="-13" y1="-13" x2="13" y2="13" stroke="#57534e" stroke-width="1.5"/>
          <line x1="13" y1="-13" x2="-13" y2="13" stroke="#57534e" stroke-width="1.5"/>
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="0.6s" repeatCount="indefinite"/>
        </g>
      </g>

      <!-- Scooter deck -->
      <path d="M120 258 L175 250 L290 250 L295 258 L175 258 Z" fill="#78716c" stroke="#57534e" stroke-width="1.5"/>

      <!-- Scooter stem / neck -->
      <line x1="275" y1="250" x2="270" y2="120" stroke="#57534e" stroke-width="5" stroke-linecap="round"/>

      <!-- Handlebars -->
      <line x1="250" y1="118" x2="290" y2="118" stroke="#57534e" stroke-width="5" stroke-linecap="round"/>
      <!-- Grips -->
      <rect x="245" y="113" width="10" height="10" rx="3" fill="#44403c"/>
      <rect x="285" y="113" width="10" height="10" rx="3" fill="#44403c"/>

      <!-- Front arm - connects body to handlebar, stretches as body bounces -->
      <g>
        <!-- Arm that will stretch between body and fixed hand -->
        <path d="M195 168 L256 118" stroke="#7a9b50" stroke-width="8" fill="none" stroke-linecap="round">
          <animate attributeName="d" values="M195 168 L256 118;M195 166 L256 118;M195 168 L256 118" dur="0.5s" repeatCount="indefinite"/>
        </path>
      </g>
      <!-- Hand gripping handlebar - stationary -->
      <ellipse cx="256" cy="118" rx="8" ry="6" fill="#7a9b50"/>

      <!-- Right arm dangling behind (swinging with the bounce) -->
      <g>
        <!-- Upper arm -->
        <path d="M185 175 Q165 190 155 210" stroke="#7a9b50" stroke-width="7" fill="none" stroke-linecap="round">
          <animate attributeName="d" values="M185 175 Q165 190 155 210;M185 173 Q165 188 155 208;M185 175 Q165 190 155 210" dur="0.5s" repeatCount="indefinite"/>
        </path>
        <!-- Forearm -->
        <path d="M155 210 Q145 230 148 245" stroke="#7a9b50" stroke-width="6" fill="none" stroke-linecap="round">
          <animate attributeName="d" values="M155 210 Q145 230 148 245;M155 208 Q145 228 148 243;M155 210 Q145 230 148 245" dur="0.5s" repeatCount="indefinite"/>
        </path>
        <!-- Hand dangling -->
        <ellipse cx="148" cy="248" rx="6" ry="5" fill="#7a9b50">
          <animate attributeName="cy" values="248;246;248" dur="0.5s" repeatCount="indefinite"/>
        </ellipse>
      </g>

      <!-- The Frog - upright riding position with bounce -->
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-2; 0,0" dur="0.5s" repeatCount="indefinite"/>
        <!-- Also lean forward slightly -->
        <animateTransform attributeName="transform" type="rotate" values="2 200 260; 4 200 260; 2 200 260" dur="0.5s" repeatCount="indefinite" additive="sum"/>

        <!-- Back leg (on deck, standing - positioned on rear half of deck) -->
        <path d="M150 195 Q155 235 162 252" stroke="#7a9b50" stroke-width="10" fill="none" stroke-linecap="round"/>
        <ellipse cx="162" cy="254" rx="12" ry="7" fill="#7a9b50"/>

        <!-- Body (upright, compact) -->
        <ellipse cx="175" cy="175" rx="38" ry="50" fill="#84a95b"/>
        <!-- Belly -->
        <ellipse cx="178" cy="180" rx="25" ry="35" fill="#c2d69e"/>

        <!-- Warts / texture -->
        <circle cx="165" cy="160" r="3" fill="#7a9b50"/>
        <circle cx="185" cy="155" r="2.5" fill="#7a9b50"/>
        <circle cx="160" cy="185" r="2" fill="#7a9b50"/>

        <!-- Head -->
        <ellipse cx="205" cy="135" rx="32" ry="26" fill="#84a95b"/>
        <!-- Chin / underside -->
        <ellipse cx="208" cy="145" rx="18" ry="12" fill="#c2d69e"/>

        <!-- Eyes (big, bulging, looking forward with excitement) -->
        <circle cx="192" cy="118" r="12" fill="#a3be7c" stroke="#6b8a45" stroke-width="1.5"/>
        <circle cx="220" cy="118" r="12" fill="#a3be7c" stroke="#6b8a45" stroke-width="1.5"/>
        <!-- Eye whites -->
        <circle cx="195" cy="117" r="7" fill="white"/>
        <circle cx="223" cy="117" r="7" fill="white"/>
        <!-- Pupils (wide with excitement) -->
        <circle cx="197" cy="117" r="4.5" fill="#1c1917"/>
        <circle cx="225" cy="117" r="4.5" fill="#1c1917"/>
        <!-- Eye shine -->
        <circle cx="198" cy="114" r="1.5" fill="white"/>
        <circle cx="226" cy="114" r="1.5" fill="white"/>

        <!-- Mouth (huge grin - excited!) -->
        <path d="M190 142 Q208 158 228 142" stroke="#5a7a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

        <!-- Cheek blush -->
        <ellipse cx="185" cy="138" rx="6" ry="4" fill="#d4a07a" opacity="0.5"/>
        <ellipse cx="228" cy="138" rx="6" ry="4" fill="#d4a07a" opacity="0.5"/>

        <!-- Scarf (animated flowing) -->
        <g>
          <!-- Main scarf part around neck -->
          <path d="M175 148 Q160 150 145 145" stroke="#dc4a3a" stroke-width="6" fill="none" stroke-linecap="round"/>
          <!-- Flowing end - animated -->
          <path d="M150 145 Q130 150 110 145 Q90 140 70 148" stroke="#dc4a3a" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.9">
            <animate attributeName="d" values="M150 145 Q130 150 110 145 Q90 140 70 148;M150 145 Q130 140 110 148 Q90 155 70 145;M150 145 Q130 150 110 145 Q90 140 70 148" dur="1s" repeatCount="indefinite" calcMode="spline" keySplines="0.5 0 0.5 1;0.5 0 0.5 1"/>
          </path>
          <path d="M148 147 Q125 155 105 150 Q85 145 65 155" stroke="#e8654a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7">
            <animate attributeName="d" values="M148 147 Q125 155 105 150 Q85 145 65 155;M148 147 Q125 145 105 152 Q85 158 65 148;M148 147 Q125 155 105 150 Q85 145 65 155" dur="1.1s" repeatCount="indefinite" calcMode="spline" keySplines="0.5 0 0.5 1;0.5 0 0.5 1"/>
          </path>
          <path d="M152 143 Q130 140 110 135 Q90 130 75 138" stroke="#dc4a3a" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6">
            <animate attributeName="d" values="M152 143 Q130 140 110 135 Q90 130 75 138;M152 143 Q130 135 110 140 Q90 148 75 130;M152 143 Q130 140 110 135 Q90 130 75 138" dur="0.9s" repeatCount="indefinite" calcMode="spline" keySplines="0.5 0 0.5 1;0.5 0 0.5 1"/>
          </path>
        </g>
      </g>
    </svg>
    <div class="projects">
      <a href="/beakspeak/">BeakSpeak</a> &mdash; learn to identify birds by ear
    </div>
  </main>
</body>
</html>
