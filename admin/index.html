<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeakSpeak Audio Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent-dim: #2a4a80;
    --green: #34d399;
    --green-dim: #1a4a35;
    --red: #f87171;
    --red-dim: #4a1a1a;
    --yellow: #fbbf24;
    --text: #e2e8f0;
    --text-dim: #7a8399;
    --radius: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    font-size: 13px;
  }

  /* ── Top bar ── */
  #topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    z-index: 10;
  }
  #topbar h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; }
  #topbar h1 span { color: var(--accent); }
  #global-count {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    color: var(--text-dim);
  }
  #global-count strong { color: var(--green); }
  #status-msg {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* ── Layout ── */
  #layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 8px 0;
  }
  .species-item {
    display: flex;
    align-items: center;
    padding: 8px 14px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.1s;
    gap: 8px;
  }
  .species-item:hover { background: var(--surface2); }
  .species-item.active {
    background: var(--surface2);
    border-left-color: var(--accent);
  }
  .species-name { flex: 1; font-weight: 500; }
  .species-badge {
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 7px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .species-badge.full { border-color: var(--green-dim); color: var(--green); }

  /* ── Main content ── */
  #main {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
  }
  #main-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 14px;
  }

  #species-header {
    margin-bottom: 16px;
  }
  #species-header h2 { font-size: 18px; font-weight: 600; }
  #species-header .sci { color: var(--text-dim); font-style: italic; font-size: 12px; margin-top: 2px; }

  .species-reference {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .ref-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 2px;
  }
  .mnemonic-text {
    font-size: 13px;
    color: var(--text);
    font-style: italic;
    line-height: 1.5;
  }
  .wiki-clips { display: flex; flex-wrap: wrap; gap: 8px; }
  .wiki-clip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
  }
  .wiki-clip.playing { border-color: var(--accent); }
  .wiki-play-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .wiki-play-btn:hover { background: var(--accent-dim); }
  .wiki-play-btn.active { background: var(--accent); color: #fff; }
  .wiki-clip-info { font-size: 11px; color: var(--text-dim); }
  .wiki-clip-info a { color: var(--accent); text-decoration: none; opacity: 0.8; }
  .wiki-clip-info a:hover { opacity: 1; text-decoration: underline; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin: 16px 0 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Clip cards ── */
  .clip-cards { display: flex; flex-direction: column; gap: 10px; }

  .clip-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s;
  }
  .clip-card.selected-card { border-color: var(--accent-dim); }
  .clip-card.playing { border-color: var(--accent); }

  /* Top row: play + spectrogram + toggle */
  .clip-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .play-btn {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    font-size: 14px;
  }
  .play-btn:hover { background: var(--accent-dim); }
  .play-btn.active { background: var(--accent); color: #fff; }

  /* Spectrogram + progress wrapper */
  .spec-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }
  .spec-canvas-container {
    position: relative;
    height: 60px;
    background: #0a0c12;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
  }
  .spec-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .spec-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #3a4060;
    pointer-events: none;
  }
  .progress-bar-wrap {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s linear;
  }
  .clip-length {
    font-size: 10px;
    color: var(--text-dim);
    text-align: right;
  }

  /* Toggle switch */
  .toggle-wrap {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .toggle-label {
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
  }
  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .toggle-slider::before {
    content: "";
    position: absolute;
    width: 14px;
    height: 14px;
    left: 2px;
    top: 2px;
    background: var(--text-dim);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked + .toggle-slider {
    background: var(--accent-dim);
    border-color: var(--accent);
  }
  .toggle input:checked + .toggle-slider::before {
    transform: translateX(16px);
    background: var(--accent);
  }

  /* Metadata row */
  .clip-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    font-size: 11px;
  }
  .badge {
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .badge-quality-A { background: #1a3a2a; color: var(--green); }
  .badge-quality-B { background: #2a3020; color: #a3e635; }
  .badge-quality-C { background: #3a3010; color: var(--yellow); }
  .badge-quality-D { background: #3a1a10; color: #fb923c; }
  .badge-quality-E { background: var(--red-dim); color: var(--red); }
  .badge-type { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
  .badge-sex-male { background: #1a2a3a; color: #60a5fa; }
  .badge-sex-female { background: #3a1a2a; color: #f9a8d4; }
  .badge-nc { background: #3a2a10; color: #fb923c; }
  .badge-warn { background: #3a2a10; color: #fb923c; }

  .meta-item { color: var(--text-dim); }
  .meta-item span { color: var(--text); }
  .meta-sep { color: var(--border); }

  .clip-links {
    display: flex;
    gap: 10px;
    font-size: 11px;
  }
  .clip-links a {
    color: var(--accent);
    text-decoration: none;
    opacity: 0.8;
    transition: opacity 0.1s;
  }
  .clip-links a:hover { opacity: 1; text-decoration: underline; }

  .remarks-row {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    border-left: 2px solid var(--border);
    padding-left: 8px;
  }
  .remarks-row span { color: var(--text); }

  .birdnet-panel {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px 12px;
    background: rgba(79, 142, 247, 0.08);
    border: 1px solid rgba(79, 142, 247, 0.18);
    border-radius: 6px;
  }
  .birdnet-heading {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }
  .birdnet-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    font-size: 11px;
  }
  .birdnet-status {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .birdnet-status-ok {
    background: rgba(52, 211, 153, 0.14);
    color: var(--green);
  }
  .birdnet-status-miss {
    background: rgba(248, 113, 113, 0.14);
    color: var(--red);
  }
  .birdnet-status-neutral {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .birdnet-summary {
    color: var(--text);
  }
  .birdnet-label {
    color: var(--text-dim);
    font-size: 11px;
    min-width: 86px;
  }
  .birdnet-species-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .birdnet-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 10px;
    color: var(--text);
  }
  .birdnet-chip-target {
    border-color: rgba(52, 211, 153, 0.35);
    background: rgba(52, 211, 153, 0.10);
  }
  .birdnet-chip-other {
    border-color: rgba(248, 113, 113, 0.20);
  }
  .birdnet-loading .birdnet-summary,
  .birdnet-empty .birdnet-summary {
    color: var(--text-dim);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div id="topbar">
  <h1>BeakSpeak <span>Audio Admin</span></h1>
  <div id="status-msg">Loading…</div>
  <div id="global-count"><strong id="sel-count">—</strong> / <span id="total-count">—</span> clips in app</div>
</div>

<div id="layout">
  <div id="sidebar"></div>
  <div id="main">
    <div id="main-empty">Select a species to review its audio clips.</div>
    <div id="species-view" style="display:none"></div>
  </div>
</div>

<script>
// ────────────────────────────────────────────────
// State
// ────────────────────────────────────────────────
let state = { species: [] };
let activeSpeciesId = null;

// Per-clip audio state
const audioState = {}; // xcId -> { audio, playing }
const wikiAudioState = {}; // wid -> { audio, playing }
// Per-clip spectrogram cache
const spectrograms = {}; // xcId -> ImageData or 'loading'
const birdNetSummaries = {}; // `${speciesId}:${xcId}` -> summary

// ────────────────────────────────────────────────
// Boot
// ────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('/api/pool');
    if (!res.ok) {
      const err = await res.json();
      setStatus(err.error || 'Failed to load pool');
      return;
    }
    const data = await res.json();
    state = data;
    renderSidebar();
    updateGlobalCount();
    setStatus('Ready');
  } catch (e) {
    setStatus('Error: ' + e.message);
  }
}

function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}

// ────────────────────────────────────────────────
// Counts
// ────────────────────────────────────────────────
function speciesCounts(sp) {
  const clips = sp.audio_clips || {};
  const all = [...(clips.songs || []), ...(clips.calls || [])];
  const selected = all.filter(c => c.selected).length;
  return { selected, total: all.length };
}

function updateGlobalCount() {
  let sel = 0, tot = 0;
  for (const sp of state.species || []) {
    const c = speciesCounts(sp);
    sel += c.selected; tot += c.total;
  }
  document.getElementById('sel-count').textContent = sel;
  document.getElementById('total-count').textContent = tot;
}

function updateSidebarBadge(speciesId) {
  const sp = state.species.find(s => s.id === speciesId);
  if (!sp) return;
  const { selected, total } = speciesCounts(sp);
  const el = document.querySelector(`.species-item[data-id="${speciesId}"] .species-badge`);
  if (!el) return;
  el.textContent = selected === total ? '✓' : `${selected}/${total}`;
  el.className = 'species-badge' + (selected === total ? ' full' : '');
}

// ────────────────────────────────────────────────
// Sidebar
// ────────────────────────────────────────────────
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  for (const sp of state.species || []) {
    const { selected, total } = speciesCounts(sp);
    const item = document.createElement('div');
    item.className = 'species-item';
    item.dataset.id = sp.id;
    item.innerHTML = `
      <span class="species-name">${sp.common_name}</span>
      <span class="species-badge${selected === total ? ' full' : ''}">${selected === total ? '✓' : `${selected}/${total}`}</span>
    `;
    item.addEventListener('click', () => selectSpecies(sp.id));
    sidebar.appendChild(item);
  }
}

function selectSpecies(id) {
  activeSpeciesId = id;
  document.querySelectorAll('.species-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  const sp = state.species.find(s => s.id === id);
  if (sp) renderSpeciesView(sp);
}

// ────────────────────────────────────────────────
// Species view
// ────────────────────────────────────────────────
function renderSpeciesView(sp) {
  document.getElementById('main-empty').style.display = 'none';
  const view = document.getElementById('species-view');
  view.style.display = 'block';
  view.innerHTML = `
    <div id="species-header">
      <h2>${sp.common_name}</h2>
      <div class="sci">${sp.scientific_name}</div>
    </div>
  `;

  // Reference panel: mnemonic + wiki audio
  const hasRef = sp.mnemonic || (sp.wikipedia_audio && sp.wikipedia_audio.length > 0);
  if (hasRef) {
    const ref = document.createElement('div');
    ref.className = 'species-reference';

    if (sp.mnemonic) {
      const m = document.createElement('div');
      m.innerHTML = `<div class="ref-label">Mnemonic</div><div class="mnemonic-text">${escHtml(sp.mnemonic)}</div>`;
      ref.appendChild(m);
    }

    if (sp.wikipedia_audio && sp.wikipedia_audio.length > 0) {
      const w = document.createElement('div');
      w.innerHTML = `<div class="ref-label">Wikipedia Audio</div>`;
      const wClips = document.createElement('div');
      wClips.className = 'wiki-clips';
      sp.wikipedia_audio.forEach((wp, i) => {
        const audioSrc = `/audio/${sp.id}/wp_${i}.ogg`;
        const wid = `wp_${sp.id}_${i}`;
        const item = document.createElement('div');
        item.className = 'wiki-clip';
        item.dataset.wid = wid;
        const fname = wp.filename ? wp.filename.replace(/^File:/, '') : `clip ${i + 1}`;
        item.innerHTML = `
          <button class="wiki-play-btn" data-wid="${wid}" title="Play">▶</button>
          <div class="wiki-clip-info">
            <div>${escHtml(fname)}</div>
            ${wp.commons_page ? `<a href="${wp.commons_page}" target="_blank" rel="noopener">Commons ↗</a>` : ''}
          </div>
        `;
        item.querySelector('.wiki-play-btn').addEventListener('click', () => toggleWikiPlay(wid, audioSrc, item));
        wClips.appendChild(item);
      });
      w.appendChild(wClips);
      ref.appendChild(w);
    }

    view.appendChild(ref);
  }

  const clips = sp.audio_clips || {};
  const songs = clips.songs || [];
  const calls = clips.calls || [];

  if (songs.length) {
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = `Songs (${songs.length})`;
    view.appendChild(label);
    const grid = document.createElement('div');
    grid.className = 'clip-cards';
    songs.forEach(clip => grid.appendChild(buildClipCard(sp, clip)));
    view.appendChild(grid);
  }

  if (calls.length) {
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = `Calls (${calls.length})`;
    view.appendChild(label);
    const grid = document.createElement('div');
    grid.className = 'clip-cards';
    calls.forEach(clip => grid.appendChild(buildClipCard(sp, clip)));
    view.appendChild(grid);
  }

  if (!songs.length && !calls.length) {
    view.innerHTML += `<div style="color:var(--text-dim);margin-top:20px">No audio clips found for this species.</div>`;
  }
}

// ────────────────────────────────────────────────
// Clip card
// ────────────────────────────────────────────────
function buildClipCard(sp, clip) {
  const xcId = String(clip.xc_id);
  const audioSrc = `/audio/${sp.id}/${xcId}.ogg`;

  const card = document.createElement('div');
  card.className = 'clip-card' + (clip.selected ? ' selected-card' : '');
  card.dataset.xcid = xcId;

  // Quality badge
  const q = clip.quality || '?';
  const qBadge = `<span class="badge badge-quality-${q}">${q}</span>`;

  // Type badge
  const typeBadge = clip.type ? `<span class="badge badge-type">${clip.type}</span>` : '';

  // Sex badge
  const sex = (clip.sex || '').toLowerCase();
  let sexBadge = '';
  if (sex === 'male') sexBadge = `<span class="badge badge-sex-male">♂ male</span>`;
  else if (sex === 'female') sexBadge = `<span class="badge badge-sex-female">♀ female</span>`;

  // License badge (NC warning)
  const licBadge = clip.commercial_ok === false ? `<span class="badge badge-nc">NC</span>` : '';

  // Playback warning
  const pbWarn = (clip.playback_used || '').toLowerCase() === 'yes'
    ? `<span class="badge badge-warn">playback</span>` : '';

  // Stage / method
  const stage = clip.stage && clip.stage !== 'adult' ? `<span class="meta-item">stage: <span>${clip.stage}</span></span><span class="meta-sep">·</span>` : '';
  const method = clip.method && clip.method !== 'field recording' ? `<span class="meta-item">method: <span>${clip.method}</span></span><span class="meta-sep">·</span>` : '';

  // Location
  const loc = clip.location ? `<span class="meta-item">${clip.location}${clip.country && clip.country !== clip.location ? `, ${clip.country}` : ''}</span>` : '';

  // Recordist
  const rec = clip.recordist ? `<span class="meta-sep">·</span><span class="meta-item">by <span>${clip.recordist}</span></span>` : '';

  // Score
  const score = clip.score != null ? `<span class="meta-sep">·</span><span class="meta-item">score <span>${clip.score}</span></span>` : '';

  // Remarks
  const remarksHtml = clip.remarks
    ? `<div class="remarks-row">💬 <span>${escHtml(clip.remarks)}</span></div>` : '';

  const birdNetHtml = `
    <div class="birdnet-panel birdnet-loading" data-birdnet="${xcId}">
      <div class="birdnet-heading">BirdNET</div>
      <div class="birdnet-summary">Loading detections…</div>
    </div>
  `;

  // Animal seen
  const animalSeen = (clip.animal_seen || '').toLowerCase() === 'yes'
    ? `<span class="meta-item">👁 seen</span><span class="meta-sep">·</span>` : '';

  card.innerHTML = `
    <div class="clip-top">
      <button class="play-btn" data-xcid="${xcId}" title="Play/pause">▶</button>
      <div class="spec-wrap">
        <div class="spec-canvas-container" data-xcid="${xcId}">
          <canvas class="spec-canvas" data-xcid="${xcId}"></canvas>
          <div class="spec-placeholder">loading…</div>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" data-xcid="${xcId}"></div>
        </div>
        <div class="clip-length">${clip.length || ''}</div>
      </div>
      <div class="toggle-wrap">
        <div class="toggle-label">In app</div>
        <label class="toggle">
          <input type="checkbox" ${clip.selected ? 'checked' : ''} data-xcid="${xcId}" data-sid="${sp.id}">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="clip-meta">
      ${qBadge}${typeBadge}${sexBadge}${licBadge}${pbWarn}
      <span class="meta-sep">·</span>
      ${animalSeen}${stage}${method}${loc}${rec}${score}
    </div>

    ${remarksHtml}
    ${birdNetHtml}

    <div class="clip-links">
      <a href="${clip.xc_url}" target="_blank" rel="noopener">xeno-canto XC${xcId} ↗</a>
      <a href="${clip.license}" target="_blank" rel="noopener">${shortLicense(clip.license)}</a>
    </div>
  `;

  // Play button
  card.querySelector('.play-btn').addEventListener('click', () => togglePlay(sp, clip, audioSrc, card));

  // Seek on spectrogram click
  card.querySelector('.spec-canvas-container').addEventListener('click', (e) => {
    seekClip(xcId, e);
  });

  // Toggle
  card.querySelector('input[type=checkbox]').addEventListener('change', async (e) => {
    await toggleSelected(sp.id, xcId, e.target.checked, card, clip);
  });

  // Pre-render spectrogram without requiring play
  renderSpectrogram(xcId, audioSrc, card);
  renderBirdNetSummary(sp, clip, card);

  return card;
}

// ────────────────────────────────────────────────
// Audio playback
// ────────────────────────────────────────────────
function togglePlay(sp, clip, audioSrc, card) {
  const xcId = String(clip.xc_id);
  const state_clip = audioState[xcId];

  // Stop any other playing clip (including wiki clips)
  for (const [id, s] of Object.entries(audioState)) {
    if (id !== xcId && s.playing) stopClip(id);
  }
  for (const [id, s] of Object.entries(wikiAudioState)) {
    if (s.playing) stopWikiClip(id);
  }

  if (state_clip && state_clip.playing) {
    stopClip(xcId);
    return;
  }

  playClip(xcId, audioSrc, card);
}

function playClip(xcId, audioSrc, card) {
  const audio = new Audio(audioSrc);
  audioState[xcId] = { audio, playing: true };

  const btn = card.querySelector(`.play-btn[data-xcid="${xcId}"]`);
  const fill = card.querySelector(`.progress-bar-fill[data-xcid="${xcId}"]`);

  btn.textContent = '⏸';
  btn.classList.add('active');
  card.classList.add('playing');

  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      const pct = (audio.currentTime / audio.duration) * 100;
      fill.style.width = pct + '%';
    }
  });

  audio.addEventListener('ended', () => {
    stopClip(xcId, card);
  });

  audio.play().catch(e => console.error('Audio play error:', e));

}

function stopClip(xcId, cardEl) {
  const s = audioState[xcId];
  if (!s) return;
  if (s.audio) { s.audio.pause(); s.audio.currentTime = 0; }
  s.playing = false;

  // Update UI — find card if not passed
  const card = cardEl || document.querySelector(`.clip-card[data-xcid="${xcId}"]`);
  if (!card) return;
  const btn = card.querySelector(`.play-btn[data-xcid="${xcId}"]`);
  const fill = card.querySelector(`.progress-bar-fill[data-xcid="${xcId}"]`);
  if (btn) { btn.textContent = '▶'; btn.classList.remove('active'); }
  if (fill) fill.style.width = '0%';
  card.classList.remove('playing');
}

function toggleWikiPlay(wid, audioSrc, itemEl) {
  // Stop any other playing clip
  for (const [id, s] of Object.entries(audioState)) {
    if (s.playing) stopClip(id);
  }
  for (const [id, s] of Object.entries(wikiAudioState)) {
    if (id !== wid && s.playing) stopWikiClip(id);
  }

  const s = wikiAudioState[wid];
  if (s && s.playing) { stopWikiClip(wid, itemEl); return; }

  const audio = new Audio(audioSrc);
  wikiAudioState[wid] = { audio, playing: true };
  const btn = itemEl.querySelector('.wiki-play-btn');
  btn.textContent = '⏸';
  btn.classList.add('active');
  itemEl.classList.add('playing');
  audio.addEventListener('ended', () => stopWikiClip(wid, itemEl));
  audio.addEventListener('error', e => console.error('Wiki audio load error:', audioSrc, e));
  console.log('Playing wiki audio:', audioSrc);
  audio.play().catch(e => {
    console.error('Wiki audio play() rejected:', audioSrc, e);
    stopWikiClip(wid, itemEl);
  });
}

function stopWikiClip(wid, itemEl) {
  const s = wikiAudioState[wid];
  if (!s) return;
  if (s.audio) { s.audio.pause(); s.audio.currentTime = 0; }
  s.playing = false;
  const el = itemEl || document.querySelector(`.wiki-clip[data-wid="${wid}"]`);
  if (!el) return;
  const btn = el.querySelector('.wiki-play-btn');
  if (btn) { btn.textContent = '▶'; btn.classList.remove('active'); }
  el.classList.remove('playing');
}

function seekClip(xcId, e) {
  const s = audioState[xcId];
  if (!s || !s.audio || !s.audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  s.audio.currentTime = pct * s.audio.duration;
}

// ────────────────────────────────────────────────
// Spectrogram
// ────────────────────────────────────────────────
async function renderSpectrogram(xcId, audioSrc, card) {
  spectrograms[xcId] = 'loading';
  const container = card.querySelector(`.spec-canvas-container[data-xcid="${xcId}"]`);
  const canvas = card.querySelector(`canvas.spec-canvas[data-xcid="${xcId}"]`);
  if (!container || !canvas) return;

  try {
    const response = await fetch(audioSrc);
    const arrayBuffer = await response.arrayBuffer();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    audioCtx.close();

    const samples = audioBuffer.getChannelData(0);
    const sampleRate = audioBuffer.sampleRate;
    const fftSize = 1024;
    const hopSize = 512;
    const numBins = fftSize / 2;
    const numFrames = Math.ceil(samples.length / hopSize);

    // Hann window
    const hann = new Float32Array(fftSize);
    for (let i = 0; i < fftSize; i++) {
      hann[i] = 0.5 * (1 - Math.cos(2 * Math.PI * i / (fftSize - 1)));
    }

    // Compute magnitudes for each frame
    const magnitudes = [];
    for (let frame = 0; frame < numFrames; frame++) {
      const start = frame * hopSize;
      const re = new Float64Array(fftSize);
      const im = new Float64Array(fftSize);
      for (let i = 0; i < fftSize; i++) {
        re[i] = (samples[start + i] || 0) * hann[i];
      }
      fft(re, im);
      const mags = new Float32Array(numBins);
      for (let i = 0; i < numBins; i++) {
        mags[i] = Math.sqrt(re[i] * re[i] + im[i] * im[i]);
      }
      magnitudes.push(mags);
    }

    // Global max for normalization
    let globalMax = 0;
    for (const mags of magnitudes) {
      for (const v of mags) if (v > globalMax) globalMax = v;
    }
    if (globalMax === 0) globalMax = 1;

    // Draw to canvas
    const W = container.clientWidth || 400;
    const H = container.clientHeight || 60;
    canvas.width = W;
    canvas.height = H;
    const ctx2d = canvas.getContext('2d');
    const imgData = ctx2d.createImageData(W, H);

    for (let x = 0; x < W; x++) {
      const frameIdx = Math.floor((x / W) * numFrames);
      const mags = magnitudes[Math.min(frameIdx, magnitudes.length - 1)];
      for (let y = 0; y < H; y++) {
        // y=0 is top (high freq), y=H-1 is bottom (low freq)
        const binIdx = Math.floor(((H - 1 - y) / H) * numBins);
        const norm = Math.pow(mags[binIdx] / globalMax, 0.3);
        const bright = Math.floor(norm * 255);
        const idx = (y * W + x) * 4;
        // Blue-tinted color scheme: dark blue -> cyan -> white
        imgData.data[idx]     = Math.floor(bright * 0.6);
        imgData.data[idx + 1] = Math.floor(bright * 0.85);
        imgData.data[idx + 2] = bright;
        imgData.data[idx + 3] = 255;
      }
    }

    ctx2d.putImageData(imgData, 0, 0);
    container.querySelector('.spec-placeholder').style.display = 'none';
    spectrograms[xcId] = true;

  } catch (e) {
    console.error('Spectrogram error for XC' + xcId + ':', e);
    spectrograms[xcId] = null;
  }
}

// Radix-2 Cooley-Tukey FFT (in-place)
function fft(re, im) {
  const n = re.length;
  // Bit-reversal permutation
  let j = 0;
  for (let i = 1; i < n; i++) {
    let bit = n >> 1;
    for (; j & bit; bit >>= 1) j ^= bit;
    j ^= bit;
    if (i < j) {
      [re[i], re[j]] = [re[j], re[i]];
      [im[i], im[j]] = [im[j], im[i]];
    }
  }
  // Butterfly passes
  for (let len = 2; len <= n; len <<= 1) {
    const ang = -2 * Math.PI / len;
    const wRe = Math.cos(ang);
    const wIm = Math.sin(ang);
    for (let i = 0; i < n; i += len) {
      let curRe = 1, curIm = 0;
      for (let k = 0; k < len / 2; k++) {
        const uRe = re[i + k];
        const uIm = im[i + k];
        const vRe = re[i + k + len / 2] * curRe - im[i + k + len / 2] * curIm;
        const vIm = re[i + k + len / 2] * curIm + im[i + k + len / 2] * curRe;
        re[i + k] = uRe + vRe;
        im[i + k] = uIm + vIm;
        re[i + k + len / 2] = uRe - vRe;
        im[i + k + len / 2] = uIm - vIm;
        const nextRe = curRe * wRe - curIm * wIm;
        curIm = curRe * wIm + curIm * wRe;
        curRe = nextRe;
      }
    }
  }
}

// ────────────────────────────────────────────────
// Toggle selected
// ────────────────────────────────────────────────
async function toggleSelected(speciesId, xcId, selected, card, clip) {
  try {
    const res = await fetch('/api/toggle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ species_id: speciesId, xc_id: xcId, selected }),
    });
    if (!res.ok) throw new Error('Server error');

    // Update in-memory state
    const sp = state.species.find(s => s.id === speciesId);
    if (sp) {
      const allClips = [...(sp.audio_clips.songs || []), ...(sp.audio_clips.calls || [])];
      const c = allClips.find(c => String(c.xc_id) === xcId);
      if (c) c.selected = selected;
    }

    card.classList.toggle('selected-card', selected);
    updateSidebarBadge(speciesId);
    updateGlobalCount();
    setStatus(selected ? `XC${xcId} marked in app` : `XC${xcId} removed from app`);

  } catch (e) {
    setStatus('Error saving: ' + e.message);
    // Revert checkbox
    card.querySelector('input[type=checkbox]').checked = !selected;
  }
}

// ────────────────────────────────────────────────
// Helpers
// ────────────────────────────────────────────────
function shortLicense(url) {
  if (!url) return '?';
  const m = url.match(/licenses\/([^/]+)/);
  if (m) return 'CC ' + m[1].toUpperCase();
  if (url.includes('publicdomain/zero')) return 'CC0';
  return 'License ↗';
}

function escHtml(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function birdNetKey(sp, clip) {
  return `${sp.id}:${String(clip.xc_id)}`;
}

function birdNetCsvUrl(sp, clip) {
  return `/audio/${sp.id}/${String(clip.xc_id)}.BirdNET.results.csv`;
}

function parseBirdNetCsv(text) {
  const lines = text.trim().split(/\r?\n/).filter(Boolean);
  if (lines.length < 2) return [];

  return lines.slice(1).map(line => {
    const parts = line.split(',');
    if (parts.length < 6) return null;
    return {
      start: Number.parseFloat(parts[0]),
      end: Number.parseFloat(parts[1]),
      scientificName: parts[2],
      commonName: parts[3],
      confidence: Number.parseFloat(parts[4]),
      file: parts.slice(5).join(','),
    };
  }).filter(row => row && Number.isFinite(row.start) && Number.isFinite(row.end) && Number.isFinite(row.confidence));
}

function mergeRanges(rows) {
  const ranges = rows
    .map(row => [row.start, row.end])
    .sort((a, b) => a[0] - b[0]);

  const merged = [];
  for (const [start, end] of ranges) {
    const last = merged[merged.length - 1];
    if (!last || start > last[1] + 0.25) {
      merged.push([start, end]);
    } else {
      last[1] = Math.max(last[1], end);
    }
  }
  return merged;
}

function formatRanges(ranges) {
  if (!ranges.length) return 'none';
  return ranges.map(([start, end]) => `${start.toFixed(1)}-${end.toFixed(1)}s`).join(', ');
}

function summarizeBirdNet(sp, rows) {
  const isTargetRow = row =>
    row.commonName === sp.common_name || row.scientificName === sp.scientific_name;

  const targetRows = rows.filter(isTargetRow);
  const speciesMap = new Map();

  for (const row of rows) {
    const key = `${row.commonName}||${row.scientificName}`;
    const existing = speciesMap.get(key) || {
      commonName: row.commonName,
      scientificName: row.scientificName,
      maxConfidence: 0,
      rows: [],
      isTarget: false,
    };
    existing.maxConfidence = Math.max(existing.maxConfidence, row.confidence);
    existing.rows.push(row);
    existing.isTarget = existing.isTarget || isTargetRow(row);
    speciesMap.set(key, existing);
  }

  const species = [...speciesMap.values()].map(entry => ({
    ...entry,
    ranges: mergeRanges(entry.rows),
  })).sort((a, b) => b.maxConfidence - a.maxConfidence || a.commonName.localeCompare(b.commonName));

  const target = species.find(entry => entry.isTarget) || null;
  const others = species.filter(entry => !entry.isTarget);

  return {
    targetDetected: targetRows.length > 0,
    target,
    others,
  };
}

function renderBirdNetPanel(panel, summary) {
  if (summary.state === 'missing') {
    panel.className = 'birdnet-panel birdnet-empty';
    panel.innerHTML = `
      <div class="birdnet-heading">BirdNET</div>
      <div class="birdnet-row">
        <span class="birdnet-status birdnet-status-neutral">No CSV</span>
        <span class="birdnet-summary">No BirdNET results found for this clip.</span>
      </div>
    `;
    return;
  }

  if (summary.state === 'empty') {
    panel.className = 'birdnet-panel birdnet-empty';
    panel.innerHTML = `
      <div class="birdnet-heading">BirdNET</div>
      <div class="birdnet-row">
        <span class="birdnet-status birdnet-status-neutral">No detections</span>
        <span class="birdnet-summary">CSV loaded, but it contained no detections.</span>
      </div>
    `;
    return;
  }

  const targetHtml = summary.targetDetected && summary.target
    ? `
      <div class="birdnet-row">
        <span class="birdnet-status birdnet-status-ok">Target detected</span>
        <span class="birdnet-summary">
          ${escHtml(summary.target.commonName)} max ${summary.target.maxConfidence.toFixed(2)} at ${escHtml(formatRanges(summary.target.ranges))}
        </span>
      </div>
    `
    : `
      <div class="birdnet-row">
        <span class="birdnet-status birdnet-status-miss">Target missing</span>
        <span class="birdnet-summary">BirdNET did not detect the target species in this clip.</span>
      </div>
    `;

  const otherSpeciesHtml = summary.others.length
    ? summary.others.map(species => `
        <span class="birdnet-chip birdnet-chip-other">
          ${escHtml(species.commonName)} ${species.maxConfidence.toFixed(2)}
        </span>
      `).join('')
    : '<span class="birdnet-chip">No non-target detections</span>';

  panel.className = 'birdnet-panel';
  panel.innerHTML = `
    <div class="birdnet-heading">BirdNET</div>
    ${targetHtml}
    <div class="birdnet-row">
      <span class="birdnet-label">Other species</span>
      <div class="birdnet-species-list">${otherSpeciesHtml}</div>
    </div>
  `;
}

async function renderBirdNetSummary(sp, clip, card) {
  const panel = card.querySelector(`[data-birdnet="${String(clip.xc_id)}"]`);
  if (!panel) return;

  const key = birdNetKey(sp, clip);
  if (birdNetSummaries[key]) {
    renderBirdNetPanel(panel, birdNetSummaries[key]);
    return;
  }

  try {
    const res = await fetch(birdNetCsvUrl(sp, clip));
    if (res.status === 404) {
      birdNetSummaries[key] = { state: 'missing' };
      renderBirdNetPanel(panel, birdNetSummaries[key]);
      return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const rows = parseBirdNetCsv(await res.text());
    birdNetSummaries[key] = rows.length
      ? { state: 'ready', ...summarizeBirdNet(sp, rows) }
      : { state: 'empty' };
    renderBirdNetPanel(panel, birdNetSummaries[key]);
  } catch (e) {
    console.error('BirdNET load error for XC' + clip.xc_id + ':', e);
    birdNetSummaries[key] = { state: 'missing' };
    renderBirdNetPanel(panel, birdNetSummaries[key]);
  }
}

// ────────────────────────────────────────────────
init();
</script>
